<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gender Reveal Poll 🎉</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --boy-primary: #4facfe;
      --boy-secondary: #00f2fe;
      --boy-glow: rgba(79, 172, 254, 0.4);
      --girl-primary: #f77fbe;
      --girl-secondary: #fda085;
      --girl-glow: rgba(247, 127, 190, 0.4);
      --bg-dark: #0f0f1a;
      --bg-card: rgba(255, 255, 255, 0.05);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --gold: #ffd700;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Animated background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(79, 172, 254, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(247, 127, 190, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(255, 215, 0, 0.04) 0%, transparent 40%);
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Main container */
    .app {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      max-width: 700px;
      padding: 2rem;
    }

    /* Header */
    .header {
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--boy-primary), var(--girl-primary), var(--gold));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease-in-out infinite;
      line-height: 1.1;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .header p {
      font-size: 1.15rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      font-weight: 300;
    }

    /* Voting section */
    .vote-section {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .vote-btn {
      position: relative;
      flex: 1;
      max-width: 260px;
      padding: 2.5rem 1.5rem;
      border: 2px solid transparent;
      border-radius: 24px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
      outline: none;
    }

    .vote-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 22px;
      opacity: 0.15;
      transition: opacity 0.4s ease;
    }

    .vote-btn:hover::before {
      opacity: 0.3;
    }

    .vote-btn:active {
      transform: scale(0.96);
    }

    .vote-btn.boy {
      background: linear-gradient(145deg, rgba(79, 172, 254, 0.15), rgba(0, 242, 254, 0.08));
      border-color: rgba(79, 172, 254, 0.3);
      box-shadow: 0 0 30px rgba(79, 172, 254, 0.1), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .vote-btn.boy::before {
      background: linear-gradient(145deg, var(--boy-primary), var(--boy-secondary));
    }

    .vote-btn.boy:hover {
      border-color: rgba(79, 172, 254, 0.6);
      box-shadow: 0 0 50px rgba(79, 172, 254, 0.25), 0 8px 32px rgba(79, 172, 254, 0.15);
      transform: translateY(-4px);
    }

    .vote-btn.girl {
      background: linear-gradient(145deg, rgba(247, 127, 190, 0.15), rgba(253, 160, 133, 0.08));
      border-color: rgba(247, 127, 190, 0.3);
      box-shadow: 0 0 30px rgba(247, 127, 190, 0.1), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .vote-btn.girl::before {
      background: linear-gradient(145deg, var(--girl-primary), var(--girl-secondary));
    }

    .vote-btn.girl:hover {
      border-color: rgba(247, 127, 190, 0.6);
      box-shadow: 0 0 50px rgba(247, 127, 190, 0.25), 0 8px 32px rgba(247, 127, 190, 0.15);
      transform: translateY(-4px);
    }

    .vote-btn .emoji {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
      transition: transform 0.3s ease;
    }

    .vote-btn:hover .emoji {
      transform: scale(1.15) rotate(-5deg);
    }

    .vote-btn .label {
      display: block;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .vote-btn .sublabel {
      display: block;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }

    /* Vote confirmed animation */
    .vote-btn.voted {
      animation: voteConfirm 0.6s ease;
    }

    @keyframes voteConfirm {
      0% { transform: scale(1); }
      30% { transform: scale(1.08); }
      60% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    /* Results section */
    .results-section {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 2rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .total-votes {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .total-votes span {
      color: var(--gold);
      font-weight: 700;
      font-size: 1.3rem;
    }

    /* Bar chart */
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .bar-label {
      font-size: 0.95rem;
      font-weight: 600;
      min-width: 50px;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      height: 42px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 21px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 21px;
      transition: width 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 1rem;
    }

    .bar-fill.boy {
      background: linear-gradient(90deg, var(--boy-primary), var(--boy-secondary));
      box-shadow: 0 0 20px var(--boy-glow);
    }

    .bar-fill.girl {
      background: linear-gradient(90deg, var(--girl-primary), var(--girl-secondary));
      box-shadow: 0 0 20px var(--girl-glow);
    }

    .bar-count {
      font-size: 0.85rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      white-space: nowrap;
    }

    .bar-percent {
      font-size: 0.85rem;
      font-weight: 600;
      min-width: 50px;
      text-align: left;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .action-btn {
      padding: 0.75rem 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .action-btn.reveal {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 165, 0, 0.15));
      border-color: rgba(255, 215, 0, 0.4);
      color: var(--gold);
      font-size: 1rem;
    }

    .action-btn.reveal:hover {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.35), rgba(255, 165, 0, 0.25));
      border-color: rgba(255, 215, 0, 0.7);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
    }

    .action-btn.reset {
      border-color: rgba(255, 80, 80, 0.3);
      color: rgba(255, 80, 80, 0.8);
    }

    .action-btn.reset:hover {
      background: rgba(255, 80, 80, 0.1);
      border-color: rgba(255, 80, 80, 0.5);
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }

    /* Reveal overlay */
    .reveal-overlay {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 26, 0.95);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      animation: fadeIn 0.5s ease;
    }

    .reveal-overlay.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Stage container */
    .reveal-stage {
      text-align: center;
      animation: revealPop 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      transform: scale(0.5);
      opacity: 0;
      display: none;
      max-width: 520px;
      width: 100%;
      padding: 0 1.5rem;
    }

    .reveal-stage.active {
      display: block;
    }

    @keyframes revealPop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Stage 1: Vote results */
    .stage1-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, var(--gold), #ffaa00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stage1-bars {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .stage1-bar-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .stage1-bar-label {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 80px;
      text-align: right;
    }

    .stage1-bar-track {
      flex: 1;
      height: 48px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      overflow: hidden;
      position: relative;
    }

    .stage1-bar-fill {
      height: 100%;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 1rem;
      transition: width 1.2s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .stage1-bar-fill.boy {
      background: linear-gradient(90deg, var(--boy-primary), var(--boy-secondary));
      box-shadow: 0 0 24px var(--boy-glow);
    }

    .stage1-bar-fill.girl {
      background: linear-gradient(90deg, var(--girl-primary), var(--girl-secondary));
      box-shadow: 0 0 24px var(--girl-glow);
    }

    .stage1-bar-value {
      font-size: 1rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      white-space: nowrap;
    }

    .stage1-bar-pct {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 55px;
      text-align: left;
    }

    .stage1-total {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .stage1-total span {
      color: var(--gold);
      font-weight: 700;
    }

    .reveal-answer-btn {
      padding: 1.2rem 3rem;
      border: 2px solid rgba(255, 215, 0, 0.5);
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 165, 0, 0.12));
      color: var(--gold);
      font-family: inherit;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.4s ease;
      letter-spacing: 0.03em;
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .reveal-answer-btn:hover {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.4), rgba(255, 165, 0, 0.25));
      border-color: var(--gold);
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
      transform: translateY(-3px) scale(1.03);
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
      50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
    }

    /* Stage 2: Slot machine + answer */
    .slot-machine {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto 1.5rem;
    }

    .slot-viewport {
      height: 200px;
      overflow: hidden;
      border-radius: 28px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      position: relative;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.3);
    }

    /* Gradient fades at top and bottom edges */
    .slot-viewport::before,
    .slot-viewport::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 40px;
      z-index: 2;
      pointer-events: none;
    }
    .slot-viewport::before {
      top: 0;
      background: linear-gradient(to bottom, var(--bg-dark), transparent);
    }
    .slot-viewport::after {
      bottom: 0;
      background: linear-gradient(to top, var(--bg-dark), transparent);
    }

    .slot-strip {
      transition: transform 0.15s cubic-bezier(0.33, 1, 0.68, 1);
    }

    .slot-item {
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .slot-item .slot-emoji {
      font-size: 5rem;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
    }

    .slot-item .slot-label {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 0.03em;
    }

    .slot-item.boy-item .slot-label {
      background: linear-gradient(135deg, var(--boy-primary), var(--boy-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .slot-item.girl-item .slot-label {
      background: linear-gradient(135deg, var(--girl-primary), var(--girl-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Glow frame when stopped on final answer */
    .slot-viewport.landed {
      border-color: var(--boy-primary);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.2), 0 0 40px var(--boy-glow), 0 0 80px rgba(79, 172, 254, 0.15);
      transition: border-color 0.5s ease, box-shadow 0.5s ease;
    }

    /* Final answer text that appears after slot stops */
    .final-answer {
      opacity: 0;
      transform: translateY(20px) scale(0.9);
      transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
    }

    .final-answer.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .final-answer-title {
      font-size: 3.5rem;
      font-weight: 900;
      margin: 1rem 0 0.3rem;
      background: linear-gradient(135deg, var(--boy-primary), var(--boy-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: revealBounce 1.2s ease-in-out infinite alternate;
    }

    @keyframes revealBounce {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-6px) scale(1.03); }
    }

    .reveal-subtitle {
      font-size: 1.2rem;
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .reveal-who-guessed {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 2rem;
      padding: 0.8rem 1.5rem;
      border-radius: 16px;
      display: inline-block;
    }

    .reveal-who-guessed.correct {
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .reveal-who-guessed.split {
      color: var(--gold);
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    /* Question mark rolling label */
    .slot-item.question-item .slot-label {
      background: linear-gradient(135deg, var(--gold), #ffaa00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @media (max-width: 600px) {
      .slot-viewport { height: 160px; }
      .slot-item { height: 160px; }
      .slot-item .slot-emoji { font-size: 3.5rem; }
      .slot-item .slot-label { font-size: 2rem; }
      .final-answer-title { font-size: 2.5rem; }
    }

    /* Countdown overlay */
    .countdown-overlay {
      position: fixed;
      inset: 0;
      z-index: 101;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 26, 0.98);
    }

    .countdown-overlay.active {
      display: flex;
    }

    .countdown-number {
      font-size: 12rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold), #ffaa00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: countPop 0.8s ease forwards;
      filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.3));
    }

    @keyframes countPop {
      0% { transform: scale(2); opacity: 0; }
      40% { transform: scale(0.9); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .reveal-stats {
      font-size: 1.3rem;
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .reveal-close {
      padding: 1rem 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .reveal-close:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1rem 2rem;
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      z-index: 200;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 2.2rem; }
      .vote-section { gap: 1rem; }
      .vote-btn { padding: 2rem 1rem; }
      .vote-btn .emoji { font-size: 2.8rem; }
      .vote-btn .label { font-size: 1.1rem; }
      .results-section { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Background particles -->
  <div class="particles" id="particles"></div>

  <!-- Main app -->
  <div class="app">
    <div class="header">
      <h1>Boy or Girl? 🍼</h1>
      <p>Tap your guess & pass the laptop along!</p>
    </div>

    <div class="vote-section">
      <button class="vote-btn boy" id="vote-boy" onclick="castVote('boy')">
        <span class="emoji">👦</span>
        <span class="label">Boy</span>
        <span class="sublabel">It's a prince!</span>
      </button>
      <button class="vote-btn girl" id="vote-girl" onclick="castVote('girl')">
        <span class="emoji">👧</span>
        <span class="label">Girl</span>
        <span class="sublabel">It's a princess!</span>
      </button>
    </div>

    <div class="results-section">
      <div class="total-votes">Total Votes: <span id="total-count">0</span></div>

      <div class="bar-chart">
        <div class="bar-row">
          <div class="bar-label" style="color: var(--boy-primary);">👦 Boy</div>
          <div class="bar-track">
            <div class="bar-fill boy" id="bar-boy" style="width: 0%;">
              <span class="bar-count" id="count-boy">0</span>
            </div>
          </div>
          <div class="bar-percent" id="pct-boy" style="color: var(--boy-primary);">0%</div>
        </div>
        <div class="bar-row">
          <div class="bar-label" style="color: var(--girl-primary);">👧 Girl</div>
          <div class="bar-track">
            <div class="bar-fill girl" id="bar-girl" style="width: 0%;">
              <span class="bar-count" id="count-girl">0</span>
            </div>
          </div>
          <div class="bar-percent" id="pct-girl" style="color: var(--girl-primary);">0%</div>
        </div>
      </div>

      <div class="actions">
        <button class="action-btn reveal" onclick="showReveal()">✨ Reveal</button>
        <button class="action-btn reset" onclick="resetPoll()">↺ Reset All</button>
      </div>
    </div>
  </div>

  <!-- Reveal overlay -->
  <div class="reveal-overlay" id="reveal-overlay">
    <!-- Stage 1: Vote Results -->
    <div class="reveal-stage" id="stage-results">
      <div class="stage1-title">📊 Poll Results</div>
      <div class="stage1-bars">
        <div class="stage1-bar-row">
          <div class="stage1-bar-label" style="color: var(--boy-primary);">👦 Boy</div>
          <div class="stage1-bar-track">
            <div class="stage1-bar-fill boy" id="s1-bar-boy" style="width: 0%;">
              <span class="stage1-bar-value" id="s1-count-boy"></span>
            </div>
          </div>
          <div class="stage1-bar-pct" id="s1-pct-boy" style="color: var(--boy-primary);"></div>
        </div>
        <div class="stage1-bar-row">
          <div class="stage1-bar-label" style="color: var(--girl-primary);">👧 Girl</div>
          <div class="stage1-bar-track">
            <div class="stage1-bar-fill girl" id="s1-bar-girl" style="width: 0%;">
              <span class="stage1-bar-value" id="s1-count-girl"></span>
            </div>
          </div>
          <div class="stage1-bar-pct" id="s1-pct-girl" style="color: var(--girl-primary);"></div>
        </div>
      </div>
      <div class="stage1-total"><span id="s1-total"></span> total votes</div>
      <button class="reveal-answer-btn" onclick="showActualAnswer()">🎉 Reveal the Answer!</button>
    </div>

    <!-- Stage 2: Slot Machine + Answer -->
    <div class="reveal-stage" id="stage-answer">
      <div class="slot-machine">
        <div class="slot-viewport" id="slot-viewport">
          <div class="slot-strip" id="slot-strip">
            <!-- Items are generated by JS -->
          </div>
        </div>
      </div>
      <div class="final-answer" id="final-answer">
        <div class="final-answer-title">IT'S A BOY! 💙</div>
        <div class="reveal-subtitle" id="answer-stats"></div>
        <div class="reveal-who-guessed" id="answer-guessed"></div>
        <br>
        <button class="reveal-close" onclick="closeReveal()">Back to Poll</button>
      </div>
    </div>
  </div>

  <!-- Countdown overlay -->
  <div class="countdown-overlay" id="countdown-overlay">
    <div class="countdown-number" id="countdown-number"></div>
  </div>

  <!-- Confetti -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // === STATE ===
    let votes = { boy: 0, girl: 0 };

    // === SOUND ENGINE (Web Audio API) ===
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function ensureAudio() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // Pop sound for votes
    function playPop(pitch = 1) {
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600 * pitch, t);
      osc.frequency.exponentialRampToValueAtTime(1200 * pitch, t + 0.08);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.15);
    }

    // Whoosh / sweep sound for opening results
    function playWhoosh() {
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(800, t + 0.3);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(400, t);
      filter.frequency.exponentialRampToValueAtTime(4000, t + 0.3);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.linearRampToValueAtTime(0.08, t + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.connect(filter).connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.45);
    }

    // Countdown beat — deep thud with rising pitch each time
    function playCountdownBeat(step) {
      ensureAudio();
      const t = audioCtx.currentTime;
      // step: 3=low, 2=mid, 1=high
      const baseFreq = 100 + (4 - step) * 60;

      // Thud
      const osc1 = audioCtx.createOscillator();
      const gain1 = audioCtx.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(baseFreq, t);
      osc1.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, t + 0.3);
      gain1.gain.setValueAtTime(0.4, t);
      gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc1.connect(gain1).connect(audioCtx.destination);
      osc1.start(t);
      osc1.stop(t + 0.4);

      // Click layer
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(baseFreq * 4, t);
      gain2.gain.setValueAtTime(0.15, t);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc2.connect(gain2).connect(audioCtx.destination);
      osc2.start(t);
      osc2.stop(t + 0.08);
    }

    // Drumroll — rapid oscillating noise
    function playDrumroll(duration = 2.5) {
      ensureAudio();
      const t = audioCtx.currentTime;
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      // Modulated noise that accelerates
      for (let i = 0; i < bufferSize; i++) {
        const progress = i / bufferSize;
        const freq = 8 + progress * 35; // rolls get faster
        const mod = Math.sin(2 * Math.PI * freq * (i / audioCtx.sampleRate));
        data[i] = (Math.random() * 2 - 1) * Math.max(0, mod) * 0.4;
      }

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(200, t);
      filter.frequency.linearRampToValueAtTime(600, t + duration);
      filter.Q.value = 2;
      gain.gain.setValueAtTime(0.01, t);
      gain.gain.linearRampToValueAtTime(0.35, t + duration * 0.8);
      gain.gain.linearRampToValueAtTime(0.5, t + duration * 0.95);
      gain.gain.linearRampToValueAtTime(0.001, t + duration);
      source.connect(filter).connect(gain).connect(audioCtx.destination);
      source.start(t);
      source.stop(t + duration);
    }

    // Fanfare — triumphant chord arpeggio
    function playFanfare() {
      ensureAudio();
      const t = audioCtx.currentTime;
      // Major chord arpeggio: C5, E5, G5, C6
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, t + i * 0.12);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.22, t + i * 0.12 + 0.05);
        gain.gain.setValueAtTime(0.22, t + i * 0.12 + 0.3);
        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 1.2);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t + i * 0.12);
        osc.stop(t + i * 0.12 + 1.2);
      });

      // Shimmering sparkle layer
      for (let i = 0; i < 8; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        const sparkleFreq = 2000 + Math.random() * 3000;
        osc.frequency.setValueAtTime(sparkleFreq, t + 0.4 + i * 0.07);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.06, t + 0.4 + i * 0.07 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4 + i * 0.07 + 0.3);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t + 0.4 + i * 0.07);
        osc.stop(t + 0.4 + i * 0.07 + 0.3);
      }
    }

    // Tada — big final hit
    function playTada() {
      ensureAudio();
      const t = audioCtx.currentTime;
      // Big bass hit
      const bass = audioCtx.createOscillator();
      const bassGain = audioCtx.createGain();
      bass.type = 'sine';
      bass.frequency.setValueAtTime(130, t);
      bass.frequency.exponentialRampToValueAtTime(65, t + 0.5);
      bassGain.gain.setValueAtTime(0.35, t);
      bassGain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      bass.connect(bassGain).connect(audioCtx.destination);
      bass.start(t);
      bass.stop(t + 0.6);

      // Cymbal crash (noise)
      const bufLen = audioCtx.sampleRate * 1.5;
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1);
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const nGain = audioCtx.createGain();
      const hpf = audioCtx.createBiquadFilter();
      hpf.type = 'highpass';
      hpf.frequency.value = 5000;
      nGain.gain.setValueAtTime(0.18, t);
      nGain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
      noise.connect(hpf).connect(nGain).connect(audioCtx.destination);
      noise.start(t);
      noise.stop(t + 1.5);
    }

    // === PARTICLES ===
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['var(--boy-primary)', 'var(--girl-primary)', 'var(--gold)', 'var(--boy-secondary)', 'var(--girl-secondary)'];
      for (let i = 0; i < 25; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        const size = Math.random() * 6 + 2;
        const colorIdx = Math.floor(Math.random() * colors.length);
        // Use hex equivalents for the computed colors
        const hexColors = ['#4facfe', '#f77fbe', '#ffd700', '#00f2fe', '#fda085'];
        p.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${Math.random() * 100}%;
          background: ${hexColors[colorIdx]};
          animation-duration: ${Math.random() * 12 + 8}s;
          animation-delay: ${Math.random() * 10}s;
          box-shadow: 0 0 ${size * 2}px ${hexColors[colorIdx]};
        `;
        container.appendChild(p);
      }
    }
    createParticles();

    // === VOTING ===
    function castVote(choice) {
      votes[choice]++;
      updateUI();

      // Sound
      playPop(choice === 'boy' ? 1 : 1.3);

      // Animate button
      const btn = document.getElementById(`vote-${choice}`);
      btn.classList.remove('voted');
      void btn.offsetWidth; // trigger reflow
      btn.classList.add('voted');

      // Mini burst
      spawnMiniBurst(choice);

      // Toast
      showToast(choice === 'boy' ? '👦 Vote recorded for Boy!' : '👧 Vote recorded for Girl!');
    }

    function updateUI() {
      const total = votes.boy + votes.girl;
      const boyPct = total > 0 ? (votes.boy / total * 100) : 0;
      const girlPct = total > 0 ? (votes.girl / total * 100) : 0;

      document.getElementById('total-count').textContent = total;
      document.getElementById('count-boy').textContent = votes.boy;
      document.getElementById('count-girl').textContent = votes.girl;
      document.getElementById('pct-boy').textContent = Math.round(boyPct) + '%';
      document.getElementById('pct-girl').textContent = Math.round(girlPct) + '%';

      // Animate bar widths
      document.getElementById('bar-boy').style.width = Math.max(boyPct, votes.boy > 0 ? 8 : 0) + '%';
      document.getElementById('bar-girl').style.width = Math.max(girlPct, votes.girl > 0 ? 8 : 0) + '%';
    }

    // === MINI BURST (on vote) ===
    function spawnMiniBurst(choice) {
      const btn = document.getElementById(`vote-${choice}`);
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const color = choice === 'boy' ? '#4facfe' : '#f77fbe';

      for (let i = 0; i < 12; i++) {
        const dot = document.createElement('div');
        const angle = (Math.PI * 2 / 12) * i;
        const dist = 40 + Math.random() * 40;
        dot.style.cssText = `
          position: fixed;
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: ${color};
          box-shadow: 0 0 8px ${color};
          left: ${cx}px;
          top: ${cy}px;
          z-index: 50;
          pointer-events: none;
          transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
          opacity: 1;
        `;
        document.body.appendChild(dot);

        requestAnimationFrame(() => {
          dot.style.left = (cx + Math.cos(angle) * dist) + 'px';
          dot.style.top = (cy + Math.sin(angle) * dist) + 'px';
          dot.style.opacity = '0';
          dot.style.transform = 'scale(0)';
        });

        setTimeout(() => dot.remove(), 700);
      }
    }

    // === REVEAL (Two-stage) ===
    const ACTUAL_ANSWER = 'boy'; // ← The actual gender!

    function showReveal() {
      const total = votes.boy + votes.girl;
      if (total === 0) {
        showToast('No votes yet! Cast some votes first.');
        return;
      }

      const boyPct = Math.round(votes.boy / total * 100);
      const girlPct = Math.round(votes.girl / total * 100);

      // Populate stage 1 data
      document.getElementById('s1-count-boy').textContent = votes.boy;
      document.getElementById('s1-count-girl').textContent = votes.girl;
      document.getElementById('s1-pct-boy').textContent = boyPct + '%';
      document.getElementById('s1-pct-girl').textContent = girlPct + '%';
      document.getElementById('s1-total').textContent = total;

      // Show overlay with stage 1
      document.getElementById('stage-results').classList.add('active');
      document.getElementById('stage-answer').classList.remove('active');
      document.getElementById('reveal-overlay').classList.add('active');

      // Sound: whoosh for results
      playWhoosh();

      // Animate bars after a brief delay
      setTimeout(() => {
        document.getElementById('s1-bar-boy').style.width = Math.max(boyPct, votes.boy > 0 ? 10 : 0) + '%';
        document.getElementById('s1-bar-girl').style.width = Math.max(girlPct, votes.girl > 0 ? 10 : 0) + '%';
      }, 300);
    }

    function showActualAnswer() {
      // Hide stage 1
      document.getElementById('stage-results').classList.remove('active');

      // Show countdown
      const countdownOverlay = document.getElementById('countdown-overlay');
      const countdownNum = document.getElementById('countdown-number');
      countdownOverlay.classList.add('active');

      // Start drumroll
      playDrumroll(23);

      let count = 3;
      countdownNum.textContent = count;
      // Re-trigger animation
      countdownNum.style.animation = 'none';
      void countdownNum.offsetWidth;
      countdownNum.style.animation = '';

      // Sound: first beat
      playCountdownBeat(count);

      const interval = setInterval(() => {
        count--;
        if (count > 0) {
          countdownNum.textContent = count;
          countdownNum.style.animation = 'none';
          void countdownNum.offsetWidth;
          countdownNum.style.animation = '';
          // Sound: countdown beat
          playCountdownBeat(count);
        } else {
          clearInterval(interval);
          countdownOverlay.classList.remove('active');

          // Show stage 2 with slot machine
          const stage2 = document.getElementById('stage-answer');
          document.getElementById('final-answer').classList.remove('visible');
          document.getElementById('slot-viewport').classList.remove('landed');
          stage2.classList.add('active');
          stage2.style.animation = 'none';
          void stage2.offsetWidth;
          stage2.style.animation = '';

          // Run the slot machine!
          runSlotMachine(() => {
            // Slot stopped — now reveal!
            playFanfare();
            playTada();

            // Glow the viewport
            document.getElementById('slot-viewport').classList.add('landed');

            // Populate stats
            const total = votes.boy + votes.girl;
            const boyPct = Math.round(votes.boy / total * 100);
            const girlPct = Math.round(votes.girl / total * 100);
            const correctVotes = votes[ACTUAL_ANSWER];
            const correctPct = Math.round(correctVotes / total * 100);

            document.getElementById('answer-stats').textContent =
              `Boy ${boyPct}% (${votes.boy}) vs Girl ${girlPct}% (${votes.girl})`;

            const guessedEl = document.getElementById('answer-guessed');
            if (correctVotes === total) {
              guessedEl.textContent = `🎯 Everyone guessed right!`;
              guessedEl.className = 'reveal-who-guessed correct';
            } else if (correctVotes === 0) {
              guessedEl.textContent = `😲 Nobody guessed right!`;
              guessedEl.className = 'reveal-who-guessed split';
            } else {
              guessedEl.textContent = `🎯 ${correctVotes} of ${total} (${correctPct}%) guessed correctly!`;
              guessedEl.className = 'reveal-who-guessed correct';
            }

            // Show final answer details with delay
            setTimeout(() => {
              document.getElementById('final-answer').classList.add('visible');
            }, 400);

            launchConfetti('boy');
            setTimeout(() => launchConfetti('boy'), 500);
            setTimeout(() => launchConfetti('boy'), 1000);
            setTimeout(() => launchConfetti('boy'), 1800);
          });
        }
      }, 900);
    }

    // === SLOT MACHINE ENGINE ===
    function playSlotTick(pitch = 1) {
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(800 * pitch, t);
      osc.frequency.exponentialRampToValueAtTime(400 * pitch, t + 0.03);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.06);
    }

    function runSlotMachine(onFinish) {
      const strip = document.getElementById('slot-strip');
      const viewport = document.getElementById('slot-viewport');
      const itemHeight = viewport.offsetHeight;

      // Build a long strip of alternating BOY/GIRL items
      // 40 items for ~20 seconds of rolling tension
      const sequence = [];
      const totalItems = 40; // Even = ends on BOY (index 0 = boy, 1 = girl, ...)
      for (let i = 0; i < totalItems; i++) {
        if (i < totalItems - 1) {
          sequence.push(i % 2 === 0 ? 'boy' : 'girl');
        } else {
          sequence.push('boy'); // final item = actual answer
        }
      }

      // Generate HTML
      strip.innerHTML = sequence.map(type => {
        if (type === 'boy') {
          return `<div class="slot-item boy-item">
            <span class="slot-emoji">👶💙</span>
            <span class="slot-label">BOY</span>
          </div>`;
        } else {
          return `<div class="slot-item girl-item">
            <span class="slot-emoji">👶💖</span>
            <span class="slot-label">GIRL</span>
          </div>`;
        }
      }).join('');

      // Start at position 0
      let currentIndex = 0;
      strip.style.transition = 'none';
      strip.style.transform = `translateY(0px)`;

      // Deceleration schedule: ~20 seconds total
      // Start blazing fast (~50ms), decelerate to crawling (~1800ms)
      const totalTicks = totalItems - 1; // 39 moves
      const delays = [];
      for (let i = 0; i < totalTicks; i++) {
        const progress = i / totalTicks;
        const minDelay = 50;
        const maxDelay = 1800;
        // Cubic easing for dramatic slowdown at the end
        const ease = progress * progress * progress;
        const delay = minDelay + (maxDelay - minDelay) * ease;
        delays.push(Math.round(delay));
      }

      // Add extra suspense pauses on the final ticks
      if (delays.length >= 5) {
        delays[delays.length - 1] += 800;  // final: agonizing pause
        delays[delays.length - 2] += 500;  // near-stop fake-out
        delays[delays.length - 3] += 300;
        delays[delays.length - 4] += 150;
        delays[delays.length - 5] += 80;
      }

      let tickIndex = 0;

      function nextTick() {
        if (tickIndex >= delays.length) {
          // Landed!
          setTimeout(onFinish, 200);
          return;
        }

        currentIndex++;
        const targetY = -(currentIndex * itemHeight);

        // Transition speed matches the current delay
        const speed = Math.max(delays[tickIndex] * 0.6, 80);
        strip.style.transition = `transform ${speed}ms cubic-bezier(0.33, 1, 0.68, 1)`;
        strip.style.transform = `translateY(${targetY}px)`;

        // Tick sound — pitch drops as it slows
        const pitchProgress = tickIndex / delays.length;
        const pitch = 1.3 - pitchProgress * 0.5;
        playSlotTick(pitch);

        tickIndex++;
        setTimeout(nextTick, delays[tickIndex - 1]);
      }

      // Start after a brief pause
      setTimeout(nextTick, 200);
    }

    function closeReveal() {
      document.getElementById('reveal-overlay').classList.remove('active');
      document.getElementById('stage-results').classList.remove('active');
      document.getElementById('stage-answer').classList.remove('active');
      document.getElementById('final-answer').classList.remove('visible');
      document.getElementById('slot-viewport').classList.remove('landed');
      // Reset stage 1 bars for next time
      document.getElementById('s1-bar-boy').style.width = '0%';
      document.getElementById('s1-bar-girl').style.width = '0%';
    }

    // === RESET ===
    function resetPoll() {
      if (votes.boy === 0 && votes.girl === 0) return;
      votes = { boy: 0, girl: 0 };
      updateUI();
      showToast('Poll reset! Ready for new votes.');
    }

    // === TOAST ===
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // === CONFETTI ENGINE ===
    const confettiCanvas = document.getElementById('confetti-canvas');
    const ctx = confettiCanvas.getContext('2d');
    let confettiPieces = [];
    let animFrame = null;

    function resizeCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function launchConfetti(type) {
      confettiPieces = [];
      const colors = type === 'boy'
        ? ['#4facfe', '#00f2fe', '#81d4fa', '#b3e5fc', '#ffffff']
        : type === 'girl'
        ? ['#f77fbe', '#fda085', '#f8bbd0', '#f48fb1', '#ffffff']
        : ['#4facfe', '#f77fbe', '#ffd700', '#00f2fe', '#fda085'];

      for (let i = 0; i < 200; i++) {
        confettiPieces.push({
          x: Math.random() * confettiCanvas.width,
          y: -20 - Math.random() * 400,
          w: Math.random() * 10 + 5,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 10,
          vx: (Math.random() - 0.5) * 4,
          vy: Math.random() * 3 + 2,
          opacity: 1,
          decay: 0.003 + Math.random() * 0.003,
        });
      }

      if (!animFrame) animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

      confettiPieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04;
        p.rotation += p.rotSpeed;
        p.opacity -= p.decay;

        if (p.opacity <= 0) return;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rotation * Math.PI) / 180);
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 4;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });

      confettiPieces = confettiPieces.filter(p => p.opacity > 0);

      if (confettiPieces.length > 0) {
        animFrame = requestAnimationFrame(animateConfetti);
      } else {
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        animFrame = null;
      }
    }
  </script>
